name: Tourism Project Pipeline

on:
  push:
    branches:
      - main
 
jobs:

  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # --- THIS IS THE DEBUG STEP ---
      - name: List files to find requirements.txt
        run: |
          echo "=== WHERE ARE WE? ==="
          pwd
          echo "=== WHAT FILES ARE HERE? ==="
          find . -name "requirements.txt"
          echo "=== FULL REPOSITORY STRUCTURE ==="
          ls -R
      # -------------------------------

      - name: Install Dependencies
        run: pip install -r ./tourism_project/deployment/requirements.txt
      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python ./tourism_project/model_building/data_register.py

# (You can leave the rest of your data-prep, model-training, and deploy-hosting jobs as they are for now)

  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r ./tourism_project/deployment/requirements.txt
      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python ./tourism_project/model_building/prep.py

  model-training:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r ./tourism_project/deployment/requirements.txt
      - name: Start MLflow Server
        run: |
          pip install mlflow
          nohup mlflow ui --host 0.0.0.0 --port 5000 &  # Run MLflow UI in the background
          sleep 5  # Wait a moment for the server to start
      - name: Model Building
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python ./tourism_project/model_building/train.py

  deploy-hosting:
    needs: [register-dataset, data-prep, model-training]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r ./tourism_project/deployment/requirements.txt
      - name: Push files to Frontend Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python ./tourism_project/hosting/hosting.py
